# Her push'ta oyunu GitHub Pages'e otomatik yayınlar.
# Yayın adresi: https://yorulmaz91.github.io/cizgi-dovusu/
# GİZLİLİK: Yayına yalnız oyunun ÇALIŞMASI için gereken dosyalar girer
# (index.html + css/ + js/ + assets/). İç belgeler (CLAUDE.md, docs/, README),
# test dosyaları (test-arena.html, claude-test.mjs) ve betikler (.bat/.ps1)
# _site klasörüne KOPYALANMAZ, dolayısıyla kamuya açık serviste GÖRÜNMEZ.
# NOT: Bir çalışma başarısız olursa "Re-run" YAPMA — eski artifact yapışıp
# "Multiple artifacts named 'github-pages'" hatası verir. Bunun yerine yeni
# push at veya Actions sekmesinden "Run workflow" ile YENİ çalışma başlat.
name: Oyunu GitHub Pages'e yayinla

on:
  push:
    branches: [main]
  workflow_dispatch:   # Actions sekmesinden elle de calistirilabilir

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment2.outputs.page_url }}
    steps:
      - name: Kodu indir
        uses: actions/checkout@v7
      - name: Pages ayarini yap (gerekirse otomatik etkinlestir)
        uses: actions/configure-pages@v6
        with:
          enablement: true
      - name: Yayın klasörünü hazırla (yalnız oyunun çalıştığı dosyalar)
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r css _site/
          cp -r js _site/
          cp -r assets _site/   # sprite kareleri (yoksa canlıda 404 olur)
      - name: Oyun dosyalarini paketle
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      # GitHub'ın yayın servisi ara ara "Deployment failed, try again later"
      # veriyor (actions/deploy-pages#406). İlk deneme düşerse 30 sn bekleyip
      # AYNI çalışma içinde bir kez daha deniyoruz (artifact yeniden
      # yüklenmediği için "multiple artifacts" sorunu oluşmaz).
      - name: Yayinla
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v5
      - name: Bekle (yeniden denemeden önce)
        if: steps.deployment.outcome == 'failure'
        run: sleep 30
      - name: Yayinla (2. deneme)
        id: deployment2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
